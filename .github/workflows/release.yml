name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: atlas-linux-x86_64
            use_zig: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: atlas-linux-aarch64
            use_zig: true
          - os: macos-latest
            target: x86_64-apple-darwin
            name: atlas-macos-x86_64
            use_zig: false
          - os: macos-latest
            target: aarch64-apple-darwin
            name: atlas-macos-aarch64
            use_zig: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: atlas-windows-x86_64.exe
            use_zig: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Install zig (for cross-compilation)
        if: matrix.use_zig == true
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0
      - name: Install cargo-zigbuild
        if: matrix.use_zig == true
        run: pip install cargo-zigbuild
      - name: Build (native)
        if: matrix.use_zig == false
        run: cargo build --release --target ${{ matrix.target }}
      - name: Build (zig cross-compile)
        if: matrix.use_zig == true
        run: cargo zigbuild --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/atlas.exe ${{ matrix.name }}
          else
            cp target/${{ matrix.target }}/release/atlas ${{ matrix.name }}
            chmod +x ${{ matrix.name }}
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate checksums
        run: |
          cd artifacts
          for dir in */; do
            for f in "$dir"*; do
              if [ -f "$f" ]; then
                sha256sum "$f" >> ../SHA256SUMS
              fi
            done
          done
          cat ../SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Publish atlas-ir
        run: cargo publish -p atlas-ir --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true
      - name: Publish atlas-compiler
        run: cargo publish -p atlas-compiler --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true
      - name: Publish atlas-runtime
        run: cargo publish -p atlas-runtime --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true
      - name: Publish atlas-cli
        run: cargo publish -p atlas-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true
