name: Publish to crates.io
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Publish atlas-ir
        working-directory: atlas-ir
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish atlas-compiler
        working-directory: atlas-compiler
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish atlas-runtime
        working-directory: atlas-runtime
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish atlas-cli
        working-directory: atlas-cli
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
