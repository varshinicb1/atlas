name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build --release
      - run: cargo test
      - run: cargo clippy -- -D warnings

  compile-all:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build --release
      - name: Compile all knowledge packages
        run: |
          for dir in packages/*/; do
            name=$(basename "$dir")
            echo "=== Compiling $name ==="
            ./target/release/atlas compile "$dir$name.md" "$dir/decisions" --out "target/$name.atlas" --json || exit 1
          done
      - name: Upload compiled bundles
        uses: actions/upload-artifact@v4
        with:
          name: atlas-bundles
          path: target/*.atlas

  validate-all:
    runs-on: ubuntu-latest
    needs: [compile-all]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build --release
      - name: Validate all compiled bundles
        run: |
          for bundle in target/*.atlas; do
            name=$(basename "$bundle" .atlas)
            echo "=== Validating $name ==="
            ./target/release/atlas verify --bundle "$bundle" --json || exit 1
          done

  website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check website assets
        run: |
          test -f website/index.html
          test -f website/css/style.css
          test -f website/js/search.js
          echo "Website assets OK"

  registry-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check registry code
        run: |
          test -f registry/src/index.ts
          test -f registry/src/registry.ts
          echo "Registry code OK"
