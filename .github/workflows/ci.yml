name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build --release
      - run: cargo test
      - run: cargo clippy -- -D warnings

  compile-all:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build --release
      - name: Compile all knowledge packages
        run: |
          for src in packages/*.md; do
            name=$(basename "$src" .md)
            echo "=== Compiling $name ==="
            if [ -f "packages/decisions/$name.yaml" ]; then
              ./target/release/atlas compile "$src" "packages/decisions/$name.yaml" --out "target/$name.atlas" --json || exit 1
            else
              ./target/release/atlas compile "$src" --out "target/$name.atlas" --json || exit 1
            fi
          done
      - name: Upload compiled bundles
        uses: actions/upload-artifact@v7
        with:
          name: atlas-bundles
          path: target/*.atlas

  validate-all:
    runs-on: ubuntu-latest
    needs: [compile-all]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build --release
      - name: Validate all compiled bundles
        run: |
          shopt -s nullglob
          for bundle in target/*.atlas; do
            name=$(basename "$bundle" .atlas)
            echo "=== Validating $name ==="
            ./target/release/atlas verify --bundle "$bundle" --json || exit 1
          done

  website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check website assets
        run: |
          test -f website/index.html
          test -f website/css/style.css
          test -f website/js/search.js
          echo "Website assets OK"

  registry-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Registry tests + typecheck
        working-directory: registry
        run: |
          npm install
          npx tsc --noEmit -p tsconfig.json
          npm test

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python SDK tests
        working-directory: python
        run: |
          python -m pip install --upgrade pip pytest
          python -m pytest -v

  mcp-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: MCP server tests + build
        working-directory: mcp-server
        run: |
          npm install
          npm test
          npm run build

  vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: VS Code extension compile + tests
        working-directory: vscode-atlas
        run: |
          npm install
          npm run compile
          npm test

  studio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Studio build + lint
        working-directory: studio
        run: |
          npm install
          npm run lint
          npm run build
