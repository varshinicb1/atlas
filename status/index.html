<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas Status</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>⬡</text></svg>" />
  <meta name="description" content="Atlas platform service status page." />
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <style>
    @layer base {
      :root {
        --bg: #0a0e12;
        --bg-2: #11171d;
        --card: #1a2332;
        --border: #1e2a3a;
        --text: #e1e8ed;
        --text-2: #8899a6;
        --accent: #3b82f6;
        --accent-2: #60a5fa;
        --green: #22c55e;
        --red: #ef4444;
        --orange: #f59e0b;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f8fafc;
          --bg-2: #f1f5f9;
          --card: #ffffff;
          --border: #e2e8f0;
          --text: #0f172a;
          --text-2: #64748b;
        }
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
      @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      .pulse { animation: pulse-dot 1.5s ease-in-out infinite; }
    }
  </style>
</head>
<body>
  <div class="min-h-screen">
    <header class="sticky top-0 z-50" style="background: color-mix(in srgb, var(--bg) 85%, transparent); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);">
      <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
        <a href="/" class="flex items-center gap-2 no-underline">
          <span class="text-xl font-extrabold tracking-tight" style="color: var(--text);">Atlas</span>
          <span class="text-xs px-2 py-0.5 rounded-full font-medium" style="background: color-mix(in srgb, var(--accent) 15%, transparent); color: var(--accent-2);">Status</span>
        </a>
        <div class="flex items-center gap-3 text-xs" style="color: var(--text-2);">
          <span id="refresh-status">Checking...</span>
          <button onclick="refreshAll()" class="px-3 py-1.5 rounded-lg text-xs font-medium transition cursor-pointer" style="background: var(--accent); color: #fff; border: none;">Refresh</button>
        </div>
      </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8">
      <h1 class="text-3xl font-bold tracking-tight mb-1">Service Status</h1>
      <p class="text-sm mb-6" style="color: var(--text-2);">Real-time health monitoring for Atlas platform services</p>

      <div id="services-grid" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>

      <div id="registry-section" class="mt-8">
        <h2 class="text-lg font-semibold tracking-tight mb-3">Registry Overview</h2>
        <div id="registry-metrics" class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6"></div>
        <div id="packages-table-wrapper"></div>
      </div>
    </main>

    <footer class="max-w-5xl mx-auto px-4 py-6 text-center text-xs" style="color: var(--text-2);">
      <span>Last full refresh: <span id="last-refresh">—</span></span>
      <span class="mx-2">·</span>
      <span>Auto-refreshes every 60s</span>
      <span class="mx-2">·</span>
      <a href="https://github.com/varshinicb1/atlas" target="_blank" rel="noopener" style="color: var(--accent-2);">GitHub</a>
    </footer>
  </div>

  <script>
    const SERVICES = [
      { id: 'registry', name: 'Registry API', url: 'https://atlas-hub-registry.cbvarshini1.workers.dev/health' },
      { id: 'website', name: 'Website', url: 'https://atlas-sh.pages.dev' },
      { id: 'npm', name: 'PyPI (atlas-knowledge-sdk)', url: 'https://pypi.org/pypi/atlas-knowledge-sdk/json' },
      { id: 'crates', name: 'crates.io (atlas-cli)', url: 'https://crates.io/api/v1/crates/atlas-cli' },
      { id: 'github', name: 'GitHub Repository', url: 'https://api.github.com/repos/varshinicb1/atlas' },
    ];

    function statusDot(status, extraClasses = '') {
      let color;
      if (status === 'ok') color = 'var(--green)';
      else if (status === 'degraded') color = 'var(--orange)';
      else color = 'var(--red)';
      return `<span class="inline-block w-3 h-3 rounded-full ${status === 'checking' ? 'pulse' : ''}" style="background: ${color}; ${extraClasses}"></span>`;
    }

    async function checkService(service) {
      const start = performance.now();
      try {
        const res = await fetch(service.url, { mode: 'cors' });
        if (!res.ok) return { status: 'degraded', ms: Math.round(performance.now() - start), detail: `HTTP ${res.status}` };
        if (service.id === 'registry') {
          const data = await res.json();
          return {
            status: data.status === 'ok' ? 'ok' : 'degraded',
            ms: Math.round(performance.now() - start),
            data,
            detail: `${data.total_packages} packages`
          };
        }
        return { status: 'ok', ms: Math.round(performance.now() - start) };
      } catch (err) {
        if (err instanceof TypeError && err.message.includes('CORS')) {
          return { status: 'error', detail: 'CORS blocked' };
        }
        return { status: 'error', detail: err.message || 'Unreachable' };
      }
    }

    function renderService(service, result) {
      const card = document.getElementById(`card-${service.id}`);
      if (!card) return;
      if (!result) {
        card.innerHTML = `
          <div class="flex items-center gap-2 mb-2">
            ${statusDot('checking')}
            <span class="font-semibold text-sm">${service.name}</span>
          </div>
          <div class="text-xs" style="color: var(--text-2);">Checking...</div>`;
        return;
      }
      const indStatus = result.status === 'ok' ? 'ok' : result.status === 'degraded' ? 'degraded' : 'error';
      const link = service.id === 'github' ? service.url : null;
      card.innerHTML = `
        <div class="flex items-center justify-between mb-2">
          <div class="flex items-center gap-2 min-w-0">
            ${statusDot(indStatus)}
            <span class="font-semibold text-sm truncate">${service.name}</span>
          </div>
          ${link ? `<a href="${link}" target="_blank" rel="noopener" class="shrink-0 text-xs font-medium no-underline hover:underline" style="color: var(--accent-2);">Visit ↗</a>` : ''}
        </div>
        <div class="flex items-center justify-between text-xs" style="color: var(--text-2);">
          <span>${result.detail || (result.ms != null ? `${result.ms}ms` : '')}</span>
          <span>${new Date().toLocaleTimeString()}</span>
        </div>`;
    }

    async function refreshAll() {
      document.getElementById('refresh-status').textContent = 'Checking...';
      SERVICES.forEach(s => renderService(s, null));
      const results = await Promise.all(SERVICES.map(async s => ({ service: s, result: await checkService(s) })));
      results.forEach(({ service, result }) => renderService(service, result));
      document.getElementById('refresh-status').textContent = 'All checks passed';
      document.getElementById('last-refresh').textContent = new Date().toLocaleTimeString();
      const regResult = results.find(r => r.service.id === 'registry')?.result;
      if (regResult?.data) renderRegistry(regResult.data);
      setTimeout(() => { document.getElementById('refresh-status').textContent = 'Idle'; }, 5000);
    }

    function renderRegistry(data) {
      document.getElementById('registry-metrics').innerHTML = `
        <div class="rounded-xl p-4 border" style="background: var(--card); border-color: var(--border);">
          <div class="text-2xl font-bold">${data.total_packages}</div>
          <div class="text-xs" style="color: var(--text-2);">Total Packages</div>
        </div>
        <div class="rounded-xl p-4 border" style="background: var(--card); border-color: var(--border);">
          <div class="text-2xl font-bold" style="color: var(--green);">${data.packages.filter(p => p.downloads > 0).length}</div>
          <div class="text-xs" style="color: var(--text-2);">Packages with Downloads</div>
        </div>
        <div class="rounded-xl p-4 border" style="background: var(--card); border-color: var(--border);">
          <div class="text-2xl font-bold" style="color: var(--accent-2);">${data.packages.reduce((s, p) => s + p.downloads, 0)}</div>
          <div class="text-xs" style="color: var(--text-2);">Total Downloads</div>
        </div>
        <div class="rounded-xl p-4 border" style="background: var(--card); border-color: var(--border);">
          <div class="text-2xl font-bold" style="color: var(--accent-2);">${new Date(data.timestamp).toLocaleDateString()}</div>
          <div class="text-xs" style="color: var(--text-2);">Last Registry Update</div>
        </div>`;

      const rows = data.packages.map(p => `
        <tr>
          <td class="px-3 py-2 text-sm font-medium">${p.name}</td>
          <td class="px-3 py-2 text-sm" style="color: var(--text-2);">${p.version}</td>
          <td class="px-3 py-2 text-sm text-right" style="color: var(--text-2);">${p.downloads}</td>
        </tr>`).join('');

      document.getElementById('packages-table-wrapper').innerHTML = `
        <div class="rounded-xl border overflow-hidden" style="background: var(--card); border-color: var(--border);">
          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <thead>
                <tr style="border-bottom: 1px solid var(--border); background: var(--bg-2);">
                  <th class="px-3 py-2.5 text-xs font-semibold uppercase tracking-wider" style="color: var(--text-2);">Package</th>
                  <th class="px-3 py-2.5 text-xs font-semibold uppercase tracking-wider" style="color: var(--text-2);">Version</th>
                  <th class="px-3 py-2.5 text-xs font-semibold uppercase tracking-wider text-right" style="color: var(--text-2);">Downloads</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>`;
    }

    function initGrid() {
      const grid = document.getElementById('services-grid');
      grid.innerHTML = SERVICES.map(s => `
        <div id="card-${s.id}" class="rounded-xl p-4 border" style="background: var(--card); border-color: var(--border);">
          <div class="flex items-center gap-2 mb-2">
            <span class="inline-block w-3 h-3 rounded-full pulse" style="background: var(--text-2);"></span>
            <span class="font-semibold text-sm">${s.name}</span>
          </div>
          <div class="text-xs" style="color: var(--text-2);">Pending...</div>
        </div>`).join('');
    }

    initGrid();
    refreshAll();
    setInterval(refreshAll, 60000);
  </script>
</body>
</html>
